<!DOCTYPE html>
<html>

<head>

<title>CarbonQuest</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Audiowide&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron', sans-serif;
color:white;
background:#0f2027;
}

/* LOGIN SCREEN */

#loginScreen{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:url("https://images.unsplash.com/photo-1446776811953-b23d57bd21aa");
background-size:cover;
}

.loginBox{
background:rgba(0,0,0,0.7);
padding:40px;
border-radius:15px;
text-align:center;
}

.loginBox h1{
font-family:'Audiowide', cursive;
letter-spacing:2px;
}

input{
padding:10px;
margin:6px;
border-radius:6px;
border:none;
}

/* SCI-FI BUTTONS */

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#00ffa6;
color:black;
cursor:pointer;
font-weight:bold;
box-shadow:0 0 10px #00ffa6;
}

button:hover{
box-shadow:0 0 20px #00ffa6;
transform:scale(1.05);
}

/* DASHBOARD */

#dashboard{
display:none;
padding:30px;
}

#userDisplay{
position:absolute;
top:20px;
left:20px;
}

#logoutBtn{
position:absolute;
top:20px;
right:20px;
}

/* GRID */

.dashboardGrid{
display:grid;
grid-template-columns:50% 50%;
gap:20px;
margin-top:40px;
}

/* PANELS */

.panel{
background:#1c2b33;
padding:20px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,255,166,0.3);
}

/* PROFILE */

.profile{
background:#1c2b33;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 0 15px rgba(0,255,166,0.3);
}

/* GRAPH */

canvas{
background:white;
border-radius:10px;
}

/* CALENDAR */

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
margin-top:10px;
}

.day{
background:#ecf0f1;
color:black;
padding:10px;
border-radius:6px;
text-align:center;
font-size:12px;
}

/* POPUPS */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.popupBox{
background:#0f2027;
border:2px solid #00ffa6;
padding:30px;
border-radius:10px;
text-align:center;
font-family:'Audiowide';
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginScreen">

<div class="loginBox">

<h1>CarbonQuest</h1>

<input id="usernameInput" placeholder="Username"><br>
<input id="passwordInput" type="password" placeholder="Password"><br>

<p>Press ENTER to login</p>

<button onclick="openCreateAccount()">Create Account</button>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<div id="userDisplay"></div>
<button id="logoutBtn" onclick="logout()">Logout</button>

<h1>CarbonQuest Dashboard</h1>

<div class="profile">

<h3>Player Profile</h3>

<div id="profileName"></div>
<div>Total Entries: <span id="entryCount">0</span></div>
<div>Average Carbon: <span id="avgCarbon">0</span></div>

</div>

<div class="dashboardGrid">

<!-- LEFT -->

<div class="panel">

<h3>Your Digital Carbon Usage</h3>

<input id="streaming" placeholder="Streaming hours"><br>
<input id="videoCalls" placeholder="Video calls hours"><br>
<input id="ai" placeholder="AI queries"><br>
<input id="searches" placeholder="Search queries"><br>
<input id="cloud" placeholder="Cloud storage GB"><br>
<input id="gaming" placeholder="Gaming hours"><br>
<input id="downloads" placeholder="Large downloads"><br>

<button onclick="calculate()">Submit Usage</button>

<div id="result"></div>

<br>

<canvas id="carbonGraph" width="400" height="200"></canvas>

</div>

<!-- RIGHT -->

<div>

<div class="panel">

<h3>Friends</h3>

<button onclick="openFriendPopup()">Add Friend</button>

<ul id="friends"></ul>

</div>

<div class="panel">

<h3>Global Leaderboard</h3>

<ul id="leaderboard"></ul>

</div>

<div class="panel">

<h3>7 Day Challenge</h3>

<button onclick="openChallenge()">Start Challenge</button>

<div id="challengeArea"></div>

</div>

</div>

</div>

</div>

<!-- FRIEND POPUP -->

<div class="popup" id="friendPopup">

<div class="popupBox">

<h3>Add Friend</h3>

<input id="friendInput" placeholder="Friend username"><br><br>

<button onclick="addFriend()">Add</button>
<button onclick="closeFriendPopup()">Close</button>

</div>

</div>

<!-- CREATE ACCOUNT -->

<div class="popup" id="createPopup">

<div class="popupBox">

<h2>Create Account</h2>

<input id="newUsername" placeholder="Username"><br>
<input id="newPassword" type="password" placeholder="Password"><br><br>

<button onclick="createAccount()">Create</button>
<button onclick="closeCreateAccount()">Close</button>

</div>

</div>

<!-- CHALLENGE SELECT -->

<div class="popup" id="challengePopup">

<div class="popupBox">

<h3>Select Friends</h3>

<select id="challengeSelect" multiple size="5"></select>

<br><br>

<button onclick="startChallenge()">Start Challenge</button>
<button onclick="closeChallenge()">Close</button>

</div>

</div>

<script>

/* STORAGE */

let users=JSON.parse(localStorage.getItem("users"))||{}
let leaderboardData=JSON.parse(localStorage.getItem("leaderboard"))||[]
let challengeData=JSON.parse(localStorage.getItem("challenge"))||null

let username=""
let history=[]
let friends=[]

/* ENTER KEY LOGIN */

document.addEventListener("keydown",function(e){

if(e.key==="Enter" && loginScreen.style.display!="none")
login()

})

/* LOGIN */

function login(){

let u=usernameInput.value
let p=passwordInput.value

if(users[u] && users[u]==p){

username=u

loginScreen.style.display="none"
dashboard.style.display="block"

userDisplay.innerHTML="User: "+username
profileName.innerHTML="Name: "+username

loadLeaderboard()
loadChallenge()

}
else alert("Account not found")

}

/* LOGOUT */

function logout(){

dashboard.style.display="none"
loginScreen.style.display="flex"

}

/* CREATE ACCOUNT */

function openCreateAccount(){createPopup.style.display="flex"}
function closeCreateAccount(){createPopup.style.display="none"}

function createAccount(){

let u=newUsername.value
let p=newPassword.value

users[u]=p
localStorage.setItem("users",JSON.stringify(users))

username=u

closeCreateAccount()

loginScreen.style.display="none"
dashboard.style.display="block"

userDisplay.innerHTML="User: "+username
profileName.innerHTML="Name: "+username

}

/* CARBON CALCULATOR */

function calculate(){

let carbon=
(streaming.value*55)+
(videoCalls.value*150)+
(ai.value*4)+
(searches.value*0.3)+
(cloud.value*2)+
(gaming.value*75)+
(downloads.value*20)

result.innerHTML="Today's Carbon: "+carbon+" g CO2"

history.push(carbon)

updateGraph()
updateProfile()

leaderboardData.push({name:username,carbon:carbon})

leaderboardData.sort((a,b)=>a.carbon-b.carbon)

localStorage.setItem("leaderboard",JSON.stringify(leaderboardData))

loadLeaderboard()

updateChallenge(carbon)

}

/* GRAPH */

function updateGraph(){

let canvas=document.getElementById("carbonGraph")
let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,400,200)

for(let i=0;i<history.length;i++){

let height=history[i]/5

ctx.fillStyle="green"

ctx.fillRect(i*40,200-height,30,height)

}

}

/* PROFILE */

function updateProfile(){

entryCount.innerHTML=history.length

let total=0
history.forEach(c=>total+=c)

avgCarbon.innerHTML=Math.round(total/history.length)

}

/* LEADERBOARD */

function loadLeaderboard(){

let list=""

leaderboardData.slice(0,10).forEach(p=>{
list+="<li>"+p.name+" - "+p.carbon+"</li>"
})

leaderboard.innerHTML=list

}

/* FRIENDS */

function openFriendPopup(){friendPopup.style.display="flex"}
function closeFriendPopup(){friendPopup.style.display="none"}

function addFriend(){

friends.push(friendInput.value)

let list=""
friends.forEach(f=>list+="<li>"+f+"</li>")

document.getElementById("friends").innerHTML=list

closeFriendPopup()

}

/* CHALLENGE */

function openChallenge(){

let select=document.getElementById("challengeSelect")
select.innerHTML=""

friends.forEach(f=>{
select.innerHTML+="<option>"+f+"</option>"
})

challengePopup.style.display="flex"

}

function closeChallenge(){
challengePopup.style.display="none"
}

function startChallenge(){

let selected=[...challengeSelect.selectedOptions].map(o=>o.value)

let players=[username,...selected]

let today=new Date()

challengeData={
players:players,
days:[]
}

for(let i=0;i<7;i++){

let d=new Date()
d.setDate(today.getDate()+i)

challengeData.days.push({
date:d.toLocaleDateString(),
scores:{}
})

}

localStorage.setItem("challenge",JSON.stringify(challengeData))

challengePopup.style.display="none"

loadChallenge()

}

function loadChallenge(){

challengeData=JSON.parse(localStorage.getItem("challenge"))

if(!challengeData) return

let html=""

challengeData.players.forEach(p=>{

html+="<h4>"+p+"</h4><div class='calendar'>"

challengeData.days.forEach(day=>{

let val=day.scores[p]||"-"

html+="<div class='day'>"+day.date+"<br>"+val+"</div>"

})

html+="</div><br>"

})

challengeArea.innerHTML=html

}

function updateChallenge(carbon){

if(!challengeData) return

let today=new Date().toLocaleDateString()

challengeData.days.forEach(day=>{

if(day.date==today)
day.scores[username]=carbon

})

localStorage.setItem("challenge",JSON.stringify(challengeData))

loadChallenge()

}

</script>

</body>

</html>
