<!DOCTYPE html>
<html>

<head>
<title>CarbonQuest</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
margin:0;
}

.panel{
background:white;
color:black;
padding:20px;
margin:20px auto;
width:420px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

input{
padding:10px;
margin:6px;
width:80%;
}

button{
padding:10px 16px;
background:#27ae60;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<h1>🌍 CarbonQuest</h1>

<div id="login" class="panel">

<h2>Enter Username</h2>

<input id="usernameInput" placeholder="Username">

<button onclick="start()">Start</button>

</div>

<div id="dashboard" class="hidden">

<div class="panel">

<h3>Your Carbon Usage</h3>

<input id="streaming" placeholder="Streaming hours">
<input id="ai" placeholder="AI queries">
<input id="cloud" placeholder="Cloud storage GB">
<input id="gaming" placeholder="Gaming hours">

<button onclick="calculate()">Submit</button>

<div id="result"></div>

</div>

<div class="panel">

<h3>Find Friends</h3>

<input id="friendInput" placeholder="Friend username">

<button onclick="addFriend()">Add Friend</button>

<ul id="friends"></ul>

</div>

<div class="panel">

<h3>Weekly Challenge</h3>

<button onclick="startChallenge()">Start 7 Day Challenge</button>

<p id="challengeStatus"></p>

</div>

<div class="panel">

<h3>Leaderboard</h3>

<ul id="leaderboard"></ul>

</div>

</div>

<script>

let username="";
let scores=[];
let friends=[];

function start(){

username=document.getElementById("usernameInput").value;

document.getElementById("login").style.display="none";
document.getElementById("dashboard").classList.remove("hidden");

}

function calculate(){

let streaming=document.getElementById("streaming").value;
let ai=document.getElementById("ai").value;
let cloud=document.getElementById("cloud").value;
let gaming=document.getElementById("gaming").value;

let carbon=
(streaming*55)+
(ai*4)+
(cloud*2)+
(gaming*75);

document.getElementById("result").innerHTML=
"Your carbon today: "+carbon+" g CO2";

scores.push({name:username,carbon:carbon});

scores.sort((a,b)=>a.carbon-b.carbon);

let list="";

for(let i=0;i<scores.length;i++){

list+="<li>"+scores[i].name+" - "+scores[i].carbon+" g CO2</li>";

}

document.getElementById("leaderboard").innerHTML=list;

}

function addFriend(){

let friend=document.getElementById("friendInput").value;

friends.push(friend);

let list="";

for(let i=0;i<friends.length;i++){

list+="<li>"+friends[i]+"</li>";

}

document.getElementById("friends").innerHTML=list;

}

function startChallenge(){

document.getElementById("challengeStatus").innerHTML=
"7 Day Challenge Started! Lowest carbon wins.";

}

</script>

</body>

</html>
