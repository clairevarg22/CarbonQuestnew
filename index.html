<!DOCTYPE html>
<html>

<head>

<title>CarbonQuest</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

/* GENERAL */

body{
margin:0;
font-family:'Orbitron', monospace;
color:white;
}

/* LOGIN SCREEN */

#loginScreen{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:url("https://images.unsplash.com/photo-1446776811953-b23d57bd21aa");
background-size:cover;
background-position:center;
}

.loginBox{
text-align:center;
background:rgba(0,0,0,0.6);
padding:40px;
border-radius:15px;
}

.loginBox input{
padding:12px;
font-size:16px;
width:220px;
border-radius:6px;
border:none;
}

.loginBox button{
padding:12px 20px;
margin-top:10px;
background:#27ae60;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

/* DASHBOARD */

#dashboard{
display:none;
background:#0f2027;
min-height:100vh;
padding:30px;
}

#userDisplay{
position:absolute;
top:20px;
left:20px;
font-size:18px;
}

.dashboardGrid{
display:grid;
grid-template-columns:60% 40%;
gap:20px;
}

/* PANELS */

.panel{
background:white;
color:black;
padding:20px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.panel input{
padding:8px;
margin:5px;
}

.panel button{
padding:8px 14px;
background:#27ae60;
border:none;
color:white;
cursor:pointer;
border-radius:6px;
}

/* CHALLENGE CALENDAR */

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
}

.day{
background:#ecf0f1;
padding:10px;
border-radius:6px;
text-align:center;
}

/* POPUPS */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.popupBox{
background:white;
color:black;
padding:30px;
border-radius:10px;
text-align:center;
}

</style>

</head>

<body>

<!-- LOGIN SCREEN -->

<div id="loginScreen">

<div class="loginBox">

<h1>CarbonQuest</h1>

<input id="usernameInput" placeholder="Username">
<br><br>

<input id="passwordInput" type="password" placeholder="Password">
<br><br>

<button onclick="login()">Enter</button>

<br><br>

<button onclick="openCreateAccount()">Create Account</button>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<div id="userDisplay"></div>

<h1>CarbonQuest Dashboard</h1>

<div class="dashboardGrid">

<!-- LEFT SIDE -->

<div class="panel">

<h3>Your Digital Carbon Usage</h3>

<input id="streaming" placeholder="Streaming hours"><br>
<input id="videoCalls" placeholder="Video calls (Zoom/Meet hours)"><br>
<input id="ai" placeholder="AI queries"><br>
<input id="searches" placeholder="Search queries"><br>
<input id="cloud" placeholder="Cloud storage GB"><br>
<input id="gaming" placeholder="Gaming hours"><br>
<input id="downloads" placeholder="Large downloads"><br>

<button onclick="calculate()">Submit Usage</button>

<div id="result"></div>

</div>

<!-- RIGHT SIDE -->

<div>

<div class="panel">

<h3>Friends</h3>

<button onclick="openFriendPopup()">Find Friends</button>

<ul id="friends"></ul>

</div>

<div class="panel">

<h3>Leaderboard</h3>

<ul id="leaderboard"></ul>

</div>

<div class="panel">

<h3>7 Day Challenge</h3>

<button onclick="startChallenge()">Start Challenge</button>

<div class="calendar" id="calendar"></div>

</div>

</div>

</div>

</div>

<!-- FRIEND POPUP -->

<div class="popup" id="friendPopup">

<div class="popupBox">

<h3>Add Friend</h3>

<input id="friendInput" placeholder="Friend username">

<br><br>

<button onclick="addFriend()">Add</button>
<button onclick="closeFriendPopup()">Close</button>

</div>

</div>

<!-- CREATE ACCOUNT POPUP -->

<div class="popup" id="createPopup">

<div class="popupBox">

<h3>Create Account</h3>

<input id="newUsername" placeholder="Create Username">
<br><br>

<input id="newPassword" type="password" placeholder="Create Password">

<br><br>

<button onclick="createAccount()">Enter</button>
<button onclick="closeCreateAccount()">Close</button>

</div>

</div>

<script>

let username=""
let scores=[]
let friends=[]
let users={}

/* LOGIN */

function login(){

let user=document.getElementById("usernameInput").value
let pass=document.getElementById("passwordInput").value

if(users[user] && users[user]==pass){

username=user

document.getElementById("loginScreen").style.display="none"
document.getElementById("dashboard").style.display="block"

document.getElementById("userDisplay").innerHTML="User: "+username

}
else{

alert("Account not found. Create one.")

}

}

/* CREATE ACCOUNT */

function openCreateAccount(){
document.getElementById("createPopup").style.display="flex"
}

function closeCreateAccount(){
document.getElementById("createPopup").style.display="none"
}

function createAccount(){

let newUser=document.getElementById("newUsername").value
let newPass=document.getElementById("newPassword").value

users[newUser]=newPass

username=newUser

closeCreateAccount()

document.getElementById("loginScreen").style.display="none"
document.getElementById("dashboard").style.display="block"

document.getElementById("userDisplay").innerHTML="User: "+username

}

/* CARBON CALCULATOR */

function calculate(){

let streaming=document.getElementById("streaming").value
let videoCalls=document.getElementById("videoCalls").value
let ai=document.getElementById("ai").value
let searches=document.getElementById("searches").value
let cloud=document.getElementById("cloud").value
let gaming=document.getElementById("gaming").value
let downloads=document.getElementById("downloads").value

let carbon=
(streaming*55)+
(videoCalls*150)+
(ai*4)+
(searches*0.3)+
(cloud*2)+
(gaming*75)+
(downloads*20)

document.getElementById("result").innerHTML=
"Today's Carbon: "+carbon+" g CO2"

scores.push({name:username,carbon:carbon})

scores.sort((a,b)=>a.carbon-b.carbon)

let list=""

for(let i=0;i<scores.length;i++){

list+="<li>"+scores[i].name+" - "+scores[i].carbon+" g</li>"

}

document.getElementById("leaderboard").innerHTML=list

}

/* FRIEND SYSTEM */

function openFriendPopup(){
document.getElementById("friendPopup").style.display="flex"
}

function closeFriendPopup(){
document.getElementById("friendPopup").style.display="none"
}

function addFriend(){

let friend=document.getElementById("friendInput").value

friends.push(friend)

let list=""

for(let i=0;i<friends.length;i++){

list+="<li>"+friends[i]+"</li>"

}

document.getElementById("friends").innerHTML=list

closeFriendPopup()

}

/* CHALLENGE */

function startChallenge(){

let calendar=""

for(let i=1;i<=7;i++){

calendar+="<div class='day'>Day "+i+"</div>"

}

document.getElementById("calendar").innerHTML=calendar

}

</script>

</body>

</html>
