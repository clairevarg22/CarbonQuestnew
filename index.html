<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Carbon Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#070b1a;
color:white;
font-family:Orbitron;
text-align:center;
margin:0;
}

/* LOGIN SCREEN */

#loginScreen{
margin-top:120px;
}

input{
padding:10px;
font-size:18px;
border-radius:6px;
border:none;
margin:10px;
}

button{
background:#00f7ff;
border:none;
padding:12px 20px;
border-radius:10px;
font-family:Orbitron;
cursor:pointer;
margin:10px;
}

button:hover{
background:#00d4db;
}

/* CREATE ACCOUNT POPUP */

#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
}

#popupContent{
background:#111633;
padding:40px;
border-radius:12px;
}

/* DASHBOARD */

#dashboard{
display:none;
padding:20px;
}

#topBar{
display:flex;
justify-content:space-between;
align-items:center;
}

#profilePanel{
background:#111633;
padding:20px;
border-radius:12px;
width:250px;
}

#graphBox{
width:500px;
margin:auto;
}

/* CHALLENGE */

#challengeBox{
background:#111633;
padding:20px;
border-radius:12px;
margin-top:30px;
}

table{
margin:auto;
border-collapse:collapse;
}

td,th{
border:1px solid #444;
padding:10px;
}

.badge{
background:gold;
color:black;
padding:6px;
border-radius:6px;
margin:4px;
display:inline-block;
}

</style>
</head>

<body>

<!-- LOGIN SCREEN -->

<div id="loginScreen">

<h1>Carbon Tracker</h1>

<input id="username" placeholder="Username">

<br>

<button onclick="login()">Login</button>

<br>

<button onclick="openPopup()">Create Account</button>

</div>

<!-- POPUP -->

<div id="popup">

<div id="popupContent">

<h2>Create Account</h2>

<input id="newUser" placeholder="Username">

<br>

<button onclick="createAccount()">Create</button>

<button onclick="closePopup()">Cancel</button>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<div id="topBar">

<h2>Dashboard</h2>

<button onclick="logout()">Logout</button>

</div>

<br>

<div id="profilePanel">

<h3 id="playerName"></h3>

<p>Level: <span id="level">1</span></p>

<p>XP: <span id="xp">0</span></p>

<div id="badges"></div>

</div>

<br>

<div id="graphBox">

<canvas id="carbonGraph"></canvas>

</div>

<br>

<input id="carbonInput" placeholder="Enter carbon usage">

<p>(press enter)</p>

<br>

<button onclick="openChallenge()">7 Day Challenge</button>

</div>

<!-- CHALLENGE -->

<div id="challengeBox" style="display:none">

<h2>7 Day Challenge</h2>

<p>Select friends:</p>

<select id="friendSelect" multiple>

<option>Alice</option>
<option>Bob</option>
<option>Charlie</option>
<option>David</option>

</select>

<br>

<button onclick="startChallenge()">Start Challenge</button>

<button onclick="endChallenge()">End Challenge</button>

<br><br>

<table id="challengeTable"></table>

</div>

<br>

<h2>Global Leaderboard</h2>

<table>

<tr>
<th>Player</th>
<th>Carbon Saved</th>
</tr>

<tr>
<td>Alice</td>
<td>120</td>
</tr>

<tr>
<td>Bob</td>
<td>98</td>
</tr>

<tr>
<td>Charlie</td>
<td>76</td>
</tr>

</table>

<script>

/* ACCOUNTS */

let accounts={}

function login(){

let user=document.getElementById("username").value

if(user==="") return

document.getElementById("loginScreen").style.display="none"

document.getElementById("dashboard").style.display="block"

document.getElementById("playerName").innerText=user

}

function logout(){

document.getElementById("dashboard").style.display="none"

document.getElementById("loginScreen").style.display="block"

}

/* POPUP */

function openPopup(){
document.getElementById("popup").style.display="flex"
}

function closePopup(){
document.getElementById("popup").style.display="none"
}

function createAccount(){

let user=document.getElementById("newUser").value

accounts[user]=true

closePopup()

alert("Account created!")

}

/* ENTER KEY */

document.getElementById("carbonInput").addEventListener("keydown",function(e){

if(e.key==="Enter"){

let val=parseFloat(this.value)

if(!val)return

addCarbon(val)

this.value=""

}

})

/* GRAPH */

let carbonData=[]

let chart=new Chart(document.getElementById("carbonGraph"),{

type:"line",

data:{
labels:[],
datasets:[{
label:"Carbon Usage",
data:carbonData
}]
}

})

function addCarbon(val){

carbonData.push(val)

chart.data.labels.push(carbonData.length)

chart.update()

gainXP(10)

}

/* XP SYSTEM */

let xp=0
let level=1

function gainXP(amount){

xp+=amount

if(xp>=100){

xp=0

level++

document.getElementById("level").innerText=level

unlockBadge()

}

document.getElementById("xp").innerText=xp

}

function unlockBadge(){

let badge=document.createElement("div")

badge.className="badge"

badge.innerText="Level "+level

document.getElementById("badges").appendChild(badge)

}

/* CHALLENGE */

function openChallenge(){

document.getElementById("challengeBox").style.display="block"

}

function startChallenge(){

let select=document.getElementById("friendSelect")

let players=["You"]

for(let option of select.selectedOptions){

players.push(option.value)

}

let table=document.getElementById("challengeTable")

table.innerHTML=""

let today=new Date()

let header="<tr><th>Player</th>"

for(let i=0;i<7;i++){

let d=new Date()

d.setDate(today.getDate()+i)

header+="<th>"+(d.getMonth()+1)+"/"+d.getDate()+"</th>"

}

header+="</tr>"

table.innerHTML+=header

players.forEach(p=>{

let row="<tr><td>"+p+"</td>"

for(let i=0;i<7;i++){

row+="<td>0</td>"

}

row+="</tr>"

table.innerHTML+=row

})

}

function endChallenge(){

document.getElementById("challengeTable").innerHTML=""

}

/* LOGIN ENTER KEY */

document.getElementById("username").addEventListener("keydown",function(e){

if(e.key==="Enter"){

login()

}

})

</script>

</body>
</html>
