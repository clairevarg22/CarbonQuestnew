<!DOCTYPE html>
<html>

<head>
<title>CarbonQuest</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Audiowide&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#0f2027;
color:white;
}

/* LOGIN */

#loginScreen{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:url("https://images.unsplash.com/photo-1446776811953-b23d57bd21aa");
background-size:cover;
}

.loginBox{
background:rgba(0,0,0,0.75);
padding:40px;
border-radius:14px;
text-align:center;
}

.loginBox h1{
font-family:'Audiowide';
}

/* BUTTONS */

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#00ffa6;
color:black;
cursor:pointer;
font-weight:bold;
box-shadow:0 0 10px #00ffa6;
}

button:hover{
box-shadow:0 0 20px #00ffa6;
}

/* DASHBOARD */

#dashboard{
display:none;
padding:30px;
}

#logoutBtn{
position:absolute;
top:20px;
right:20px;
}

/* GRID */

.dashboardGrid{
display:grid;
grid-template-columns:50% 50%;
gap:20px;
margin-top:40px;
}

.panel{
background:#1c2b33;
padding:20px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,255,166,0.3);
}

/* PROFILE */

.profile{
background:#1c2b33;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

canvas{
background:white;
border-radius:10px;
}

/* CALENDAR */

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
margin-top:10px;
}

.day{
background:#ecf0f1;
color:black;
padding:10px;
border-radius:6px;
font-size:12px;
text-align:center;
}

/* POPUPS */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.popupBox{
background:#0f2027;
border:2px solid #00ffa6;
padding:30px;
border-radius:10px;
font-family:'Audiowide';
text-align:center;
}

.badge{
display:inline-block;
padding:6px 10px;
background:#00ffa6;
color:black;
border-radius:6px;
margin:4px;
font-size:12px;
}

</style>
</head>

<body>

<div id="loginScreen">

<div class="loginBox">

<h1>CarbonQuest</h1>

<input id="usernameInput" placeholder="Username"><br>
<input id="passwordInput" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<br><br>

<button onclick="openCreateAccount()">Create Account</button>

</div>

</div>

<div id="dashboard">

<button id="logoutBtn" onclick="logout()">Logout</button>

<h1>CarbonQuest Dashboard</h1>

<div class="profile">

<h3>Player Profile</h3>

<div id="profileName"></div>

<div>XP: <span id="xp">0</span></div>

<div>Level: <span id="level">1</span></div>

<h4>Achievements</h4>

<div id="badges"></div>

</div>

<div class="dashboardGrid">

<div class="panel">

<h3>Carbon Calculator</h3>

<input id="streaming" placeholder="Streaming hours"><br>
<input id="videoCalls" placeholder="Video calls"><br>
<input id="ai" placeholder="AI queries"><br>
<input id="searches" placeholder="Search queries"><br>
<input id="cloud" placeholder="Cloud GB"><br>
<input id="gaming" placeholder="Gaming hours"><br>
<input id="downloads" placeholder="Large downloads"><br>

<button onclick="calculate()">Submit</button>

<div id="result"></div>

<br>

<canvas id="graph" width="400" height="200"></canvas>

</div>

<div>

<div class="panel">

<h3>Friends</h3>

<button onclick="openFriendPopup()">Add Friend</button>

<ul id="friends"></ul>

</div>

<div class="panel">

<h3>Global Leaderboard</h3>

<ul id="leaderboard"></ul>

</div>

<div class="panel">

<h3>7 Day Challenge</h3>

<button onclick="openChallenge()">Start Challenge</button>

<button onclick="endChallenge()">End Challenge</button>

<div id="challengeArea"></div>

</div>

</div>

</div>

</div>

<div class="popup" id="createPopup">

<div class="popupBox">

<h2>Create Account</h2>

<input id="newUsername" placeholder="Username"><br>

<input id="newPassword" type="password" placeholder="Password"><br><br>

<button onclick="createAccount()">Create</button>

<button onclick="closeCreateAccount()">Close</button>

</div>

</div>

<div class="popup" id="friendPopup">

<div class="popupBox">

<h3>Add Friend</h3>

<input id="friendInput" placeholder="Friend username"><br><br>

<button onclick="addFriend()">Add</button>

<button onclick="closeFriendPopup()">Close</button>

</div>

</div>

<div class="popup" id="challengePopup">

<div class="popupBox">

<h3>Select Friends</h3>

<select id="challengeSelect" multiple size="5"></select>

<br><br>

<button onclick="startChallenge()">Start</button>

<button onclick="closeChallenge()">Close</button>

</div>

</div>

<script>

let users=JSON.parse(localStorage.getItem("users"))||{}
let leaderboardData=JSON.parse(localStorage.getItem("leaderboard"))||[]

let username=""
let history=[]
let xp=0
let level=1
let badges=[]
let friendsList=[]

function login(){

let u=usernameInput.value
let p=passwordInput.value

if(users[u] && users[u]==p){

username=u

loginScreen.style.display="none"
dashboard.style.display="block"

profileName.innerHTML="Name: "+username

loadLeaderboard()

}

else alert("Account not found")

}

function logout(){

dashboard.style.display="none"
loginScreen.style.display="flex"

}

function openCreateAccount(){createPopup.style.display="flex"}

function closeCreateAccount(){createPopup.style.display="none"}

function createAccount(){

let u=newUsername.value
let p=newPassword.value

users[u]=p

localStorage.setItem("users",JSON.stringify(users))

closeCreateAccount()

}

function openFriendPopup(){friendPopup.style.display="flex"}

function closeFriendPopup(){friendPopup.style.display="none"}

function addFriend(){

let f=friendInput.value

friendsList.push(f)

let list=""

friendsList.forEach(friend=>{

list+="<li>"+friend+"</li>"

})

friends.innerHTML=list

closeFriendPopup()

}

function calculate(){

let carbon=

(streaming.value*55)+
(videoCalls.value*150)+
(ai.value*4)+
(searches.value*0.3)+
(cloud.value*2)+
(gaming.value*75)+
(downloads.value*20)

result.innerHTML="Today's Carbon: "+carbon+" g CO2"

history.push(carbon)

xp+=10

checkLevel()
checkAchievements()

updateGraph()

leaderboardData.push({name:username,carbon:carbon})

leaderboardData.sort((a,b)=>a.carbon-b.carbon)

localStorage.setItem("leaderboard",JSON.stringify(leaderboardData))

loadLeaderboard()

}

function updateGraph(){

let canvas=document.getElementById("graph")

let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,400,200)

for(let i=0;i<history.length;i++){

let h=history[i]/5

ctx.fillStyle="green"

ctx.fillRect(i*40,200-h,30,h)

}

}

function checkLevel(){

level=Math.floor(xp/50)+1

document.getElementById("xp").innerHTML=xp

document.getElementById("level").innerHTML=level

}

function checkAchievements(){

if(history.length==1 && !badges.includes("First Entry"))

addBadge("First Entry")

if(history.length==5 && !badges.includes("Eco Starter"))

addBadge("Eco Starter")

if(history.length==10 && !badges.includes("Carbon Tracker"))

addBadge("Carbon Tracker")

}

function addBadge(name){

badges.push(name)

document.getElementById("badges").innerHTML+=

"<span class='badge'>"+name+"</span>"

}

function loadLeaderboard(){

let list=""

leaderboardData.slice(0,10).forEach(p=>{

list+="<li>"+p.name+" - "+p.carbon+"</li>"

})

leaderboard.innerHTML=list

}

function openChallenge(){

challengeSelect.innerHTML=""

friendsList.forEach(f=>{

challengeSelect.innerHTML+="<option>"+f+"</option>"

})

challengePopup.style.display="flex"

}

function closeChallenge(){

challengePopup.style.display="none"

}

function startChallenge(){

let players=[username,...[...challengeSelect.selectedOptions].map(o=>o.value)]

let html=""

let today=new Date()

players.forEach(p=>{

html+="<h4>"+p+"</h4><div class='calendar'>"

for(let i=0;i<7;i++){

let d=new Date()

d.setDate(today.getDate()+i)

html+="<div class='day'>"+d.toLocaleDateString()+"<br>-</div>"

}

html+="</div><br>"

})

challengeArea.innerHTML=html

challengePopup.style.display="none"

}

function endChallenge(){

challengeArea.innerHTML=""

}

</script>

</body>
</html>
