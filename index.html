<!DOCTYPE html>
<html>

<head>
<title>CarbonQuest</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
margin:0;
padding:0;
}

.container{
background:white;
color:black;
width:450px;
margin:40px auto;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

input{
padding:10px;
margin:8px;
width:85%;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:12px 20px;
background:#27ae60;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#2ecc71;
}

.result{
margin-top:20px;
font-size:18px;
}

ul{
list-style:none;
padding:0;
}

li{
background:#ecf0f1;
margin:5px;
padding:8px;
border-radius:5px;
}

</style>
</head>

<body>

<h1>CarbonQuest 🌍</h1>
<p>Track the carbon footprint of your digital life</p>

<div class="container">

<h3>Enter Daily Usage</h3>

<input id="streaming" placeholder="Streaming hours"><br>
<input id="ai" placeholder="AI queries"><br>
<input id="cloud" placeholder="Cloud storage (GB)"><br>
<input id="gaming" placeholder="Gaming hours"><br>

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>

<h3>Leaderboard</h3>

<input id="username" placeholder="Your name">

<button onclick="addScore()">Submit Score</button>

<ul id="leaderboard"></ul>

</div>

<script>

function calculate(){

let streaming = document.getElementById("streaming").value;
let ai = document.getElementById("ai").value;
let cloud = document.getElementById("cloud").value;
let gaming = document.getElementById("gaming").value;

let carbon =
(streaming*55) +
(ai*4) +
(cloud*2) +
(gaming*75);

let ecoScore = Math.max(0,100-carbon/10);

document.getElementById("result").innerHTML=
"Daily Carbon: "+carbon+" g CO2<br>Eco Score: "+ecoScore;

}
function addScore(){

let name=document.getElementById("username").value;

let streaming=document.getElementById("streaming").value;
let ai=document.getElementById("ai").value;
let cloud=document.getElementById("cloud").value;
let gaming=document.getElementById("gaming").value;

let carbon=
(streaming*55)+
(ai*4)+
(cloud*2)+
(gaming*75);

scores.push({name:name,carbon:carbon});

scores.sort((a,b)=>a.carbon-b.carbon);

let list="";

for(let i=0;i<scores.length;i++){

list+="<li>"+scores[i].name+" - "+scores[i].carbon+" g CO2</li>";

}

document.getElementById("leaderboard").innerHTML=list;

}
  
</script>

</body>
</html>
