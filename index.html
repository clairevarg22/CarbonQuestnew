<!DOCTYPE html>
<html>

<head>

<title>CarbonQuest</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Audiowide&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#0f2027;
color:white;
}

#loginScreen{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:url("https://images.unsplash.com/photo-1446776811953-b23d57bd21aa");
background-size:cover;
}

.loginBox{
background:rgba(0,0,0,0.8);
padding:40px;
border-radius:14px;
text-align:center;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#00ffa6;
color:black;
cursor:pointer;
font-weight:bold;
margin:5px;
}

#dashboard{
display:none;
padding:30px;
max-width:1200px;
margin:auto;
}

#logoutBtn{
position:absolute;
top:20px;
right:20px;
}

.dashboardGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
margin-top:30px;
}

.panel{
background:#1c2b33;
padding:25px;
border-radius:12px;
}

.profile{
background:#1c2b33;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.calcRow{
margin-bottom:12px;
}

.calcRow label{
font-size:12px;
color:#00ffa6;
display:block;
}

.calcInput{
width:100%;
padding:8px;
border-radius:6px;
border:none;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
margin-top:10px;
}

.day{
background:#ecf0f1;
color:black;
padding:10px;
border-radius:6px;
font-size:11px;
text-align:center;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.popupBox{
background:#0f2027;
border:2px solid #00ffa6;
padding:30px;
border-radius:10px;
}

.badge{
display:inline-block;
background:#00ffa6;
color:black;
padding:6px 10px;
border-radius:6px;
margin:4px;
font-size:12px;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginScreen">

<div class="loginBox">

<h1>CarbonQuest</h1>

<input id="usernameInput" placeholder="Username"><br>
<input id="passwordInput" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button><br><br>

<button onclick="openCreateAccount()">Create Account</button>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<button id="logoutBtn" onclick="logout()">Logout</button>

<h1>CarbonQuest Dashboard</h1>

<div class="profile">

<h3 id="profileName"></h3>

<div>XP: <span id="xp">0</span></div>
<div>Level: <span id="level">1</span></div>

<h4 style="cursor:pointer" onclick="openAchievements()">Achievements</h4>

<div id="badges"></div>

</div>

<div class="dashboardGrid">

<!-- CALCULATOR -->

<div class="panel">

<h3>Digital Carbon Calculator</h3>

<div class="calcRow">
<label>Streaming Hours (≈55g CO2/hr)</label>
<input class="calcInput" id="streaming">
</div>

<div class="calcRow">
<label>Video Calls (≈150g CO2/hr)</label>
<input class="calcInput" id="videoCalls">
</div>

<div class="calcRow">
<label>AI Queries (≈4g per query)</label>
<input class="calcInput" id="ai">
</div>

<div class="calcRow">
<label>Cloud Storage (≈2g per GB)</label>
<input class="calcInput" id="cloud">
</div>

<div class="calcRow">
<label>Gaming (≈75g CO2/hr)</label>
<input class="calcInput" id="gaming">
</div>

<button onclick="calculate()">Calculate</button>

<div id="result"></div>

</div>

<!-- RIGHT PANEL -->

<div>

<div class="panel">

<h3>Friends</h3>

<button onclick="openFriendPopup()">Add Friend</button>

<ul id="friends"></ul>

</div>

<div class="panel">

<h3>Global Leaderboard</h3>

<ul id="leaderboard"></ul>

</div>

<div class="panel">

<h3>7 Day Challenge</h3>

<button onclick="openChallenge()">Start Challenge</button>
<button onclick="endChallenge()">End Challenge</button>

<div id="challengeArea"></div>

</div>

</div>

</div>

</div>

<!-- POPUPS -->

<div class="popup" id="friendPopup">
<div class="popupBox">

<h3>Add Friend</h3>

<input id="friendInput"><br><br>

<button onclick="addFriend()">Add</button>
<button onclick="closeFriendPopup()">Close</button>

</div>
</div>

<div class="popup" id="challengePopup">
<div class="popupBox">

<h3>Select Friends</h3>

<select id="challengeSelect" multiple size="5"></select>

<br><br>

<button onclick="startChallenge()">Start</button>
<button onclick="closeChallenge()">Close</button>

</div>
</div>

<div class="popup" id="achievementsPopup">
<div class="popupBox">

<h3>All Achievements</h3>

<p>First Entry</p>
<p>Eco Starter</p>
<p>Carbon Tracker</p>

<button onclick="closeAchievements()">Close</button>

</div>
</div>

<script>

let users=JSON.parse(localStorage.getItem("users"))||{}
let leaderboardData=JSON.parse(localStorage.getItem("leaderboard"))||[]

let username=""
let xp=0
let level=1
let history=[]
let badges=[]
let friendsList=[]

function resetUser(){

xp=0
level=1
history=[]
badges=[]
friendsList=[]

document.getElementById("xp").innerText=0
document.getElementById("level").innerText=1
document.getElementById("badges").innerHTML=""
document.getElementById("friends").innerHTML=""

}

function login(){

let u=usernameInput.value
let p=passwordInput.value

if(users[u] && users[u]==p){

username=u

resetUser()

loginScreen.style.display="none"
dashboard.style.display="block"

profileName.innerText="Player: "+username

loadLeaderboard()

}

}

function logout(){

dashboard.style.display="none"
loginScreen.style.display="flex"

}

function calculate(){

let carbon=
(streaming.value*55)+
(videoCalls.value*150)+
(ai.value*4)+
(cloud.value*2)+
(gaming.value*75)

result.innerText="Today's Carbon: "+carbon+" g CO2"

history.push(carbon)

xp+=10
updateLevel()
checkAchievements()

leaderboardData.push({name:username,carbon:carbon})

leaderboardData.sort((a,b)=>a.carbon-b.carbon)

localStorage.setItem("leaderboard",JSON.stringify(leaderboardData))

loadLeaderboard()

}

function updateLevel(){

level=Math.floor(xp/50)+1

document.getElementById("xp").innerText=xp
document.getElementById("level").innerText=level

}

function checkAchievements(){

if(history.length==1)addBadge("First Entry")

if(history.length==5)addBadge("Eco Starter")

if(history.length==10)addBadge("Carbon Tracker")

}

function addBadge(name){

if(badges.includes(name))return

badges.push(name)

document.getElementById("badges").innerHTML+=
"<span class='badge'>"+name+"</span>"

}

function loadLeaderboard(){

let list=""

leaderboardData.slice(0,10).forEach(p=>{
list+="<li>"+p.name+" - "+p.carbon+"</li>"
})

leaderboard.innerHTML=list

}

/* FRIENDS */

function openFriendPopup(){
friendPopup.style.display="flex"
}

function closeFriendPopup(){
friendPopup.style.display="none"
}

function addFriend(){

let f=friendInput.value

friendsList.push(f)

let list=""

friendsList.forEach(friend=>{
list+="<li>"+friend+"</li>"
})

friends.innerHTML=list

friendInput.value=""

closeFriendPopup()

}

/* CHALLENGE */

function openChallenge(){

challengeSelect.innerHTML=""

friendsList.forEach(f=>{
challengeSelect.innerHTML+="<option>"+f+"</option>"
})

challengePopup.style.display="flex"

}

function closeChallenge(){
challengePopup.style.display="none"
}

function startChallenge(){

let players=[username,...[...challengeSelect.selectedOptions].map(o=>o.value)]

let html=""

let today=new Date()

players.forEach(p=>{

html+="<h4>"+p+"</h4><div class='calendar'>"

for(let i=0;i<7;i++){

let d=new Date()
d.setDate(today.getDate()+i)

html+="<div class='day'>"+d.toLocaleDateString()+"<br>-</div>"

}

html+="</div><br>"

})

challengeArea.innerHTML=html

challengePopup.style.display="none"

}

function endChallenge(){
challengeArea.innerHTML=""
}

function openAchievements(){
achievementsPopup.style.display="flex"
}

function closeAchievements(){
achievementsPopup.style.display="none"
}

</script>

</body>
</html>
