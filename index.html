<!DOCTYPE html>
<html>
<head>
<title>Carbon Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Rajdhani&display=swap" rel="stylesheet">

<style>

body{
background:#0b0f1c;
color:white;
font-family:Rajdhani;
margin:0;
}

h1,h2,h3{
font-family:Orbitron;
}

button{
background:#00c3ff;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
font-family:Orbitron;
}

button:hover{
background:#009ad1;
}

input,select{
padding:8px;
margin:5px;
}

.page{
display:none;
padding:25px;
}

#loginPage{
display:block;
text-align:center;
margin-top:150px;
}

.dashboard{
display:grid;
grid-template-columns:repeat(2,200px);
gap:15px;
margin-top:30px;
}

.card{
background:#111831;
padding:20px;
border-radius:10px;
}

.challengeGrid{
display:grid;
grid-template-columns:120px repeat(7,70px);
gap:5px;
margin-top:20px;
}

.dayBox{
background:#18234b;
padding:10px;
text-align:center;
border-radius:6px;
}

.topbar{
display:flex;
justify-content:space-between;
}

.friendList{
margin-top:10px;
}

</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage">

<h1>Carbon Tracker</h1>

<input id="loginUser" placeholder="Username">
<br>

<button onclick="openCreate()">Create Account</button>

</div>


<!-- CREATE ACCOUNT POPUP -->
<div id="createPopup" style="display:none; position:fixed; top:30%; left:40%; background:#111831; padding:20px; border-radius:10px;">

<h3>Create Account</h3>

<input id="newUser" placeholder="Username">
<br>
<button onclick="createAccount()">Create</button>

</div>



<!-- DASHBOARD -->
<div id="dashboardPage" class="page">

<div class="topbar">
<h2 id="welcome"></h2>
<button onclick="logout()">Logout</button>
</div>

<div class="dashboard">

<button onclick="showCalculator()">Carbon Calculator</button>

<button onclick="showChallenge()">7 Day Challenge</button>

<button onclick="showLeaderboard()">Leaderboard</button>

<button onclick="showAchievements()">Achievements</button>

</div>

</div>



<!-- CALCULATOR -->
<div id="calcPage" class="page">

<h2>Carbon Calculator</h2>

<div class="card">

<label>Electricity (kWh)</label>
<input id="electricity">
<span>≈ 0.85 lb CO2 per kWh</span>

<br>

<label>Car Miles</label>
<input id="miles">
<span>≈ 0.89 lb CO2 per mile</span>

<br>

<label>Flights (hours)</label>
<input id="flight">
<span>≈ 250 lb CO2 per hour</span>

<br>

<button onclick="calculateCarbon()">Calculate</button>

</div>

<h3 id="carbonResult"></h3>

<button onclick="back()">Back</button>

</div>



<!-- CHALLENGE -->
<div id="challengePage" class="page">

<h2>7 Day Challenge</h2>

<button onclick="openFriends()">Add Friends</button>

<div id="friendSelector" class="friendList"></div>

<div id="challengeBoard"></div>

<button onclick="endChallenge()">End Challenge</button>

<br><br>

<button onclick="back()">Back</button>

</div>



<!-- LEADERBOARD -->
<div id="leaderboardPage" class="page">

<h2>Global Leaderboard</h2>

<ol id="leaderboardList"></ol>

<button onclick="back()">Back</button>

</div>



<!-- ACHIEVEMENTS -->
<div id="achievementPage" class="page">

<h2>Achievements</h2>

<ul>
<li>🌱 First Entry</li>
<li>🔥 7 Day Challenge Completed</li>
<li>🏆 Top 10 Leaderboard</li>
<li>⚡ Level 5 Carbon Saver</li>
</ul>

<button onclick="back()">Back</button>

</div>


<script>

let accounts={}
let currentUser=null

let leaderboard=[]

let friends=["Friend1","Friend2","Friend3"]

let challengeActive=false
let challengePlayers=[]
let challengeData={}

document.getElementById("loginUser").addEventListener("keypress",function(e){
if(e.key==="Enter"){
login()
}
})

function login(){

let name=document.getElementById("loginUser").value

if(accounts[name]){
currentUser=name
startUser()
}

}

function createAccount(){

let name=document.getElementById("newUser").value

accounts[name]={carbon:0}

currentUser=name

document.getElementById("createPopup").style.display="none"

startUser()

}

function openCreate(){
document.getElementById("createPopup").style.display="block"
}

function startUser(){

document.getElementById("loginPage").style.display="none"
document.getElementById("dashboardPage").style.display="block"

document.getElementById("welcome").innerText="Welcome "+currentUser

challengeActive=false
challengePlayers=[]
challengeData={}

}

function logout(){

currentUser=null

document.getElementById("dashboardPage").style.display="none"
document.getElementById("loginPage").style.display="block"

}

function showCalculator(){
switchPage("calcPage")
}

function showChallenge(){
switchPage("challengePage")
}

function showLeaderboard(){
switchPage("leaderboardPage")
renderLeaderboard()
}

function showAchievements(){
switchPage("achievementPage")
}

function switchPage(page){

document.querySelectorAll(".page").forEach(p=>p.style.display="none")

document.getElementById(page).style.display="block"

}

function back(){

document.querySelectorAll(".page").forEach(p=>p.style.display="none")

document.getElementById("dashboardPage").style.display="block"

}

function calculateCarbon(){

let e=document.getElementById("electricity").value*0.85
let m=document.getElementById("miles").value*0.89
let f=document.getElementById("flight").value*250

let total=Math.round(e+m+f)

document.getElementById("carbonResult").innerText="Today's Carbon: "+total+" lbs"

accounts[currentUser].carbon=total

updateLeaderboard(total)

if(challengeActive){
logChallenge(total)
}

}

function updateLeaderboard(score){

leaderboard.push({user:currentUser,score:score})

leaderboard.sort((a,b)=>a.score-b.score)

leaderboard=leaderboard.slice(0,10)

}

function renderLeaderboard(){

let list=document.getElementById("leaderboardList")
list.innerHTML=""

leaderboard.forEach(l=>{
let li=document.createElement("li")
li.innerText=l.user+" - "+l.score
list.appendChild(li)
})

}

function openFriends(){

let box=document.getElementById("friendSelector")
box.innerHTML=""

friends.forEach(f=>{

let cb=document.createElement("input")
cb.type="checkbox"
cb.value=f

box.appendChild(cb)
box.appendChild(document.createTextNode(f))
box.appendChild(document.createElement("br"))

})

let start=document.createElement("button")
start.innerText="Start Challenge"
start.onclick=startChallenge

box.appendChild(start)

}

function startChallenge(){

challengePlayers=[currentUser]

document.querySelectorAll("#friendSelector input").forEach(cb=>{
if(cb.checked)challengePlayers.push(cb.value)
})

challengePlayers.forEach(p=>{
challengeData[p]=[0,0,0,0,0,0,0]
})

challengeActive=true

renderChallenge()

}

function renderChallenge(){

let board=document.getElementById("challengeBoard")
board.innerHTML=""

let grid=document.createElement("div")
grid.className="challengeGrid"

grid.appendChild(document.createElement("div"))

for(let i=0;i<7;i++){

let d=new Date()
d.setDate(d.getDate()+i)

let box=document.createElement("div")
box.className="dayBox"
box.innerText=d.getMonth()+1+"/"+d.getDate()

grid.appendChild(box)

}

challengePlayers.forEach(p=>{

let name=document.createElement("div")
name.innerText=p
grid.appendChild(name)

challengeData[p].forEach(v=>{
let cell=document.createElement("div")
cell.className="dayBox"
cell.innerText=v||"-"
grid.appendChild(cell)
})

})

board.appendChild(grid)

}

function logChallenge(value){

let day=new Date().getDay()%7

challengeData[currentUser][day]=value

renderChallenge()

}

function endChallenge(){

challengeActive=false
challengePlayers=[]
challengeData={}

document.getElementById("challengeBoard").innerHTML=""

}

</script>

</body>
</html>
