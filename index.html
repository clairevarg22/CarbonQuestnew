<!DOCTYPE html>
<html>

<head>

<title>CarbonQuest</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron', monospace;
color:white;
background:#0f2027;
}

/* LOGIN */

#loginScreen{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:url("https://images.unsplash.com/photo-1446776811953-b23d57bd21aa");
background-size:cover;
background-position:center;
}

.loginBox{
text-align:center;
background:rgba(0,0,0,0.7);
padding:40px;
border-radius:15px;
}

input{
padding:10px;
margin:6px;
border-radius:6px;
border:none;
}

/* SCIFI BUTTONS */

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#00ffa6;
color:black;
cursor:pointer;
font-weight:bold;
box-shadow:0 0 10px #00ffa6;
}

button:hover{
box-shadow:0 0 20px #00ffa6;
transform:scale(1.05);
}

/* DASHBOARD */

#dashboard{
display:none;
min-height:100vh;
padding:30px;
}

#userDisplay{
position:absolute;
top:20px;
left:20px;
font-size:18px;
}

#logoutBtn{
position:absolute;
top:20px;
right:20px;
}

/* GRID */

.dashboardGrid{
display:grid;
grid-template-columns:50% 50%;
gap:20px;
margin-top:40px;
}

/* PANELS */

.panel{
background:#1c2b33;
padding:20px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,255,166,0.3);
}

.panel h3{
margin-top:0;
}

/* PROFILE */

.profile{
background:#1c2b33;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 0 15px rgba(0,255,166,0.3);
}

/* GRAPH */

canvas{
background:white;
border-radius:10px;
}

/* CALENDAR */

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
margin-top:10px;
}

.day{
background:#ecf0f1;
color:black;
padding:10px;
border-radius:6px;
text-align:center;
}

/* POPUPS */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.popupBox{
background:white;
color:black;
padding:30px;
border-radius:10px;
text-align:center;
}

</style>

</head>

<body>

<!-- LOGIN SCREEN -->

<div id="loginScreen">

<div class="loginBox">

<h1>CarbonQuest</h1>

<input id="usernameInput" placeholder="Username"><br>

<input id="passwordInput" type="password" placeholder="Password"><br>

<button onclick="login()">Enter</button>

<br><br>

<button onclick="openCreateAccount()">Create Account</button>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<div id="userDisplay"></div>
<button id="logoutBtn" onclick="logout()">Logout</button>

<h1>CarbonQuest Dashboard</h1>

<!-- PLAYER PROFILE -->

<div class="profile">

<h3>Player Profile</h3>

<div id="profileName"></div>
<div>Total Entries: <span id="entryCount">0</span></div>
<div>Average Carbon: <span id="avgCarbon">0</span></div>

</div>

<div class="dashboardGrid">

<!-- LEFT -->

<div class="panel">

<h3>Your Digital Carbon Usage</h3>

<input id="streaming" placeholder="Streaming hours"><br>
<input id="videoCalls" placeholder="Video calls hours"><br>
<input id="ai" placeholder="AI queries"><br>
<input id="searches" placeholder="Search queries"><br>
<input id="cloud" placeholder="Cloud storage GB"><br>
<input id="gaming" placeholder="Gaming hours"><br>
<input id="downloads" placeholder="Large downloads"><br>

<button onclick="calculate()">Submit Usage</button>

<div id="result"></div>

<br>

<canvas id="carbonGraph" width="400" height="200"></canvas>

</div>

<!-- RIGHT -->

<div>

<div class="panel">

<h3>Friends</h3>

<button onclick="openFriendPopup()">Add Friend</button>

<ul id="friends"></ul>

</div>

<div class="panel">

<h3>Leaderboard</h3>

<ul id="leaderboard"></ul>

</div>

<div class="panel">

<h3>7 Day Challenge</h3>

<button onclick="openChallenge()">Start Challenge</button>

<div id="challengeArea"></div>

</div>

</div>

</div>

</div>

<!-- FRIEND POPUP -->

<div class="popup" id="friendPopup">

<div class="popupBox">

<h3>Add Friend</h3>

<input id="friendInput" placeholder="Friend username"><br><br>

<button onclick="addFriend()">Add</button>
<button onclick="closeFriendPopup()">Close</button>

</div>

</div>

<!-- CREATE ACCOUNT -->

<div class="popup" id="createPopup">

<div class="popupBox">

<h3>Create Account</h3>

<input id="newUsername" placeholder="Username"><br>
<input id="newPassword" type="password" placeholder="Password"><br><br>

<button onclick="createAccount()">Enter</button>
<button onclick="closeCreateAccount()">Close</button>

</div>

</div>

<!-- CHALLENGE SELECT -->

<div class="popup" id="challengePopup">

<div class="popupBox">

<h3>Select Friends</h3>

<select id="challengeSelect"></select>

<br><br>

<button onclick="startChallenge()">Start</button>
<button onclick="closeChallenge()">Close</button>

</div>

</div>

<script>

let username=""
let users={}
let scores=[]
let friends=[]
let history=[]

/* LOGIN */

function login(){

let user=usernameInput.value
let pass=passwordInput.value

if(users[user] && users[user]==pass){

username=user

loginScreen.style.display="none"
dashboard.style.display="block"

userDisplay.innerHTML="User: "+username
profileName.innerHTML="Name: "+username

}
else alert("Account not found")

}

/* LOGOUT */

function logout(){

dashboard.style.display="none"
loginScreen.style.display="flex"

}

/* CREATE ACCOUNT */

function openCreateAccount(){createPopup.style.display="flex"}
function closeCreateAccount(){createPopup.style.display="none"}

function createAccount(){

let u=newUsername.value
let p=newPassword.value

users[u]=p
username=u

closeCreateAccount()

loginScreen.style.display="none"
dashboard.style.display="block"

userDisplay.innerHTML="User: "+username
profileName.innerHTML="Name: "+username

}

/* CARBON CALCULATOR */

function calculate(){

let carbon=
(streaming.value*55)+
(videoCalls.value*150)+
(ai.value*4)+
(searches.value*0.3)+
(cloud.value*2)+
(gaming.value*75)+
(downloads.value*20)

result.innerHTML="Today's Carbon: "+carbon+" g CO2"

history.push(carbon)

updateGraph()
updateProfile()

scores.push({name:username,carbon:carbon})
scores.sort((a,b)=>a.carbon-b.carbon)

let list=""
for(let i=0;i<scores.length;i++)
list+="<li>"+scores[i].name+" - "+scores[i].carbon+"</li>"

leaderboard.innerHTML=list

}

/* GRAPH */

function updateGraph(){

let canvas=document.getElementById("carbonGraph")
let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,400,200)

for(let i=0;i<history.length;i++){

let x=i*50
let y=200-history[i]/5

ctx.fillRect(x,y,30,history[i]/5)

}

}

/* PROFILE */

function updateProfile(){

entryCount.innerHTML=history.length

let total=0
for(let c of history) total+=c

avgCarbon.innerHTML=Math.round(total/history.length)

}

/* FRIENDS */

function openFriendPopup(){friendPopup.style.display="flex"}
function closeFriendPopup(){friendPopup.style.display="none"}

function addFriend(){

friends.push(friendInput.value)

let list=""
friends.forEach(f=>list+="<li>"+f+"</li>")

document.getElementById("friends").innerHTML=list

closeFriendPopup()

}

/* CHALLENGE */

function openChallenge(){

let select=document.getElementById("challengeSelect")

select.innerHTML=""

friends.forEach(f=>{
select.innerHTML+="<option>"+f+"</option>"
})

challengePopup.style.display="flex"

}

function closeChallenge(){
challengePopup.style.display="none"
}

function startChallenge(){

let friend=challengeSelect.value

challengePopup.style.display="none"

let players=[username,friend]

let html=""

players.forEach(p=>{

html+="<h4>"+p+"</h4>"
html+="<div class='calendar'>"

for(let i=1;i<=7;i++)
html+="<div class='day'>Day "+i+"</div>"

html+="</div><br>"

})

challengeArea.innerHTML=html

}

</script>

</body>

</html>
